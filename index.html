<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 스마트 가계부 - Professional Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #FBF8F3;
            --bg-card: #FFFFFF;
            --text-primary: #3E362E;
            --text-muted: #8A7E72;
            --brand-color: #795548;
            --accent-income: #2E7D32;
            --accent-expense: #C62828;
            --border-light: #F0EAE1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #D6CFC4; color: var(--text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .phone-wrapper {
            width: 100%; max-width: 412px; height: 100vh; background-color: var(--bg-main); position: relative;
            display: flex; flex-direction: column; overflow: hidden; padding-top: calc(12px + env(safe-area-inset-top, 16px));
        }

        .tab-content { 
            flex: 1; display: none; flex-direction: column;
            padding: 10px 16px calc(64px + env(safe-area-inset-bottom, 4px)) 16px; height: 100%; overflow: hidden;
        }
        .tab-content.active { display: flex; }

        .global-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
        .selector-group { display: flex; gap: 6px; }
        .select-box { background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-primary); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }

        .app-card { 
            background-color: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; 
            border: 1px solid var(--border-light); box-shadow: 0 4px 12px rgba(138, 126, 114, 0.02); flex-shrink: 0;
        }
        
        .dashboard-main { background: linear-gradient(135deg, #FFFDF9 0%, #F5EFE6 100%); text-align: center; }
        .dashboard-main .label { font-size: 12px; color: var(--text-muted); }
        .dashboard-main .val { font-size: 24px; font-weight: 700; margin: 2px 0; }
        .dashboard-main .msg { font-size: 11px; color: var(--brand-color); }

        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
        .grid-item { background: var(--bg-card); padding: 10px; border-radius: 12px; border: 1px solid var(--border-light); display: flex; align-items: center; gap: 8px; }
        .grid-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 13px; }
        .grid-info span { font-size: 11px; color: var(--text-muted); display: block; }
        .grid-info strong { font-size: 12px; font-weight: 700; }

        .section-title-row { display: flex; justify-content: space-between; align-items: center; margin: 2px 0 6px 2px; flex-shrink: 0; }
        .section-title { font-size: 13px; font-weight: 700; }
        .btn-more { font-size: 11px; color: var(--text-muted); cursor: pointer; }

        .scrollable-card-box { flex: 1; min-height: 100px; overflow-y: auto; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-light); padding: 4px 12px; margin-bottom: 12px; }
        .scrollable-card-box::-webkit-scrollbar { display: none; }

        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F5EFE6; cursor: pointer; }
        .history-item:last-child { border-bottom: none; }
        .item-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
        .item-icon { width: 26px; height: 26px; border-radius: 6px; background: #F5EFE6; display: flex; justify-content: center; align-items: center; font-size: 12px; color: var(--brand-color); }
        .item-info-text { min-width: 0; flex: 1; }
        .item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .item-sub { font-size: 11px; color: var(--text-muted); }
        .item-right { text-align: right; display: flex; align-items: center; gap: 6px; }
        .item-amt { font-size: 13px; font-weight: 700; }
        
        .btn-delete { background: none; border: none; color: #C62828; opacity: 0.4; cursor: pointer; padding: 4px; }
        .tag-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; background: #FF9800; color: white; border: none; }
        .tag-status.misu-active { background: #2E7D32; }

        .search-row { display: flex; gap: 6px; margin-bottom: 10px; flex-shrink: 0; }
        .search-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border-light); padding: 8px 12px; border-radius: 10px; font-size: 13px; outline: none; }
        .btn-filter-misu { background: #FAF3EC; color: #FF9800; border: 1px solid #FFE0B2; padding: 0 12px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* 보고서 커스텀 구조 */
        .report-section { display: flex; flex-direction: column; gap: 14px; }
        .report-block-title { font-size: 12px; font-weight: 700; color: var(--brand-color); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .compare-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dashed #F0EAE1; }
        
        .ai-comment-box { background: #FAF6F0; border-left: 4px solid var(--brand-color); padding: 10px; border-radius: 4px; font-size: 12px; line-height: 1.6; color: #5D534A; }

        .chart-pure-css { display: flex; flex-direction: column; gap: 8px; }
        .chart-row-item { display: flex; flex-direction: column; gap: 2px; }
        .chart-label-group { display: flex; justify-content: space-between; font-size: 12px; }
        .chart-track { width: 100%; height: 8px; background: #EFEBE4; border-radius: 4px; overflow: hidden; }
        .chart-fill { height: 100%; border-radius: 4px; background: var(--brand-color); }

        .nav-bar { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: calc(54px + env(safe-area-inset-bottom, 4px)); 
            background-color: var(--bg-card); border-top: 1px solid var(--border-light); display: flex; padding-bottom: env(safe-area-inset-bottom, 4px); z-index: 10; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; flex: 1; height: 100%; justify-content: center; cursor: pointer; }
        .nav-item i { font-size: 15px; margin-bottom: 2px; }
        .nav-item.active { color: var(--text-primary); font-weight: 700; }

        /* 공통 모달 디자인 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 100; visibility: hidden; opacity: 0; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .custom-modal { background: var(--bg-card); border-radius: 16px; width: 88%; padding: 16px; }
        .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; text-align: center; }
        .form-group { margin-bottom: 10px; }
        .form-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .form-control { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-light); font-size: 13px; outline: none; }
        .modal-buttons { display: flex; gap: 8px; margin-top: 14px; }
        .btn-modal { flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-wrapper">
    
    <!-- 1️⃣ 홈 탭 -->
    <div id="tab-home" class="tab-content active">
        <div class="global-header">
            <h1 style="font-size: 18px; font-weight: 700;">소비 대시보드</h1>
            <div class="selector-group">
                <select class="select-box"><option>2026년</option></select>
                <select class="select-box"><option>6월</option></select>
            </div>
        </div>
        
        <div class="app-card dashboard-main">
            <span class="label">선택 월 순 자산 수지</span>
            <div class="val" id="v-suji">0원</div>
            <div class="msg" id="v-msg">📊 데이터를 입력하여 가계 자산을 분석해보세요.</div>
        </div>
        
        <div class="grid-4">
            <div class="grid-item">
                <div class="grid-icon" style="background:#E8F5E9; color:#2E7D32;"><i class="fa-solid fa-wallet"></i></div>
                <div class="grid-info"><span>수입 총합</span><strong id="v-inc">0원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#FFEBEE; color:#C62828;"><i class="fa-solid fa-pizza-slice"></i></div>
                <div class="grid-info"><span>변동 지출</span><strong id="v-exp">0원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#ECEFF1; color:#455A64;"><i class="fa-solid fa-lock"></i></div>
                <div class="grid-info"><span>고정비</span><strong id="v-fix">0원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#E8F0FE; color:#1565C0;"><i class="fa-solid fa-chart-line"></i></div>
                <div class="grid-info"><span>저축·투자</span><strong id="v-inv">0원</strong></div>
            </div>
        </div>

        <div class="section-title-row">
            <span class="section-title">⏱️ 최근 내역 기록</span>
            <span class="btn-more" id="go-to-history">명세서 보기 <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></span>
        </div>
        
        <div class="scrollable-card-box" id="home-recent-box"></div>
    </div>

    <!-- 2️⃣ 내역 탭 -->
    <div id="tab-history" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 18px; font-weight: 700;">상세 내역 명세서</h1>
        </div>
        <div class="search-row">
            <input type="text" class="search-input" id="search-input" placeholder="🔍 내역 실시간 검색...">
            <button class="btn-filter-misu" id="btn-toggle-misu">미수 정산만</button>
        </div>
        <div class="scrollable-card-box" id="full-history-box" style="flex:1; margin-bottom:0;"></div>
    </div>

    <!-- 3️⃣ 입력 탭 -->
    <div id="tab-input" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 18px; font-weight: 700;">자연어 다중 기록 인풋</h1>
        </div>
        <div class="app-card" style="padding: 16px; flex-shrink: 0;">
            <textarea style="width:100%; height:150px; background:#FBF8F3; border:1px solid #E5DEC9; border-radius:12px; padding:12px; font-size:13px; resize:none; outline:none; margin-bottom: 12px; line-height: 1.5;" id="ai-textarea" placeholder="여기에 자유롭게 작성하세요. (단위 환산 및 다중 문장 자동 분할 지원)&#10;&#10;예시 입력문장:&#10;월급 7500000원 입금 완료. 점심식사로 삼계탕 12000원 먹고 커피 4500원 결제함. 커피는 친구꺼까지 같이 9000원 변동 지출하고 4500원은 정산받을 미수금액임."></textarea>
            <button style="width:100%; background:var(--text-primary); color:white; border:none; padding:12px; border-radius:12px; font-weight:700; cursor:pointer; font-size:14px;" id="btn-ai-submit">지능형 다중 분할 분석 실행</button>
        </div>
    </div>

    <!-- 4️⃣ 분석 탭 (월간 보고서 고도화) -->
    <div id="tab-analysis" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 18px; font-weight: 700;">월간 자산 분석 보고서</h1>
        </div>
        <div class="app-card" style="flex:1; overflow-y:auto; padding: 14px; margin-bottom:0; display:flex; flex-direction:column; gap:16px;">
            
            <div>
                <div class="report-block-title"><span>📊 유형별 자산 비교 지표</span></div>
                <div class="chart-pure-css" id="analysis-type-box"></div>
            </div>

            <div>
                <div class="report-block-title"><span>🍕 카테고리별 세부 지출 비율</span></div>
                <div class="chart-pure-css" id="analysis-chart-box"></div>
            </div>

            <div>
                <div class="report-block-title"><span>🔄 전월 비교 분석 (기준: 5월 대비)</span></div>
                <div id="analysis-compare-box"></div>
            </div>

            <div>
                <div class="report-block-title"><span>✨ AI 자동 생성 코멘트 리포트</span></div>
                <div class="ai-comment-box" id="ai-comment-text">데이터를 취합하고 있습니다...</div>
            </div>
            
        </div>
    </div>

    <!-- ⚓ 하단 고정 탭 바 -->
    <div class="nav-bar">
        <div class="nav-item active" data-target="tab-home"><i class="fa-solid fa-house"></i>홈</div>
        <div class="nav-item" data-target="tab-history"><i class="fa-regular fa-file-lines"></i>내역</div>
        <div class="nav-item" data-target="tab-input"><i class="fa-solid fa-plus"></i>입력</div>
        <div class="nav-item" data-target="tab-analysis"><i class="fa-solid fa-chart-pie"></i>분석</div>
    </div>
</div>

<!-- 내역 수정 모달 팝업 -->
<div class="modal-overlay" id="edit-modal">
    <div class="custom-modal">
        <div class="modal-title">📝 거래 내역 정밀 수정</div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>날짜 및 시간</label>
            <input type="text" class="form-control" id="edit-datetime">
        </div>
        <div class="form-group">
            <label>카테고리 분류</label>
            <select class="form-control" id="edit-category">
                <option value="💰 월급">💰 월급</option>
                <option value="🍚 식비">🍚 식비</option>
                <option value="☕ 카페">☕ 카페</option>
                <option value="📺 고정구독">📺 고정구독</option>
                <option value="📈 저축·투자">📈 저축·투자</option>
                <option value="기타">기타</option>
            </select>
        </div>
        <div class="form-group">
            <label>거래 내역명</label>
            <input type="text" class="form-control" id="edit-title">
        </div>
        <div class="form-group">
            <label>금액 (원)</label>
            <input type="number" class="form-control" id="edit-amount">
        </div>
        <div class="modal-buttons">
            <button class="btn-modal" style="background:#EFEBE4; color:var(--text-primary);" id="btn-edit-close">취소</button>
            <button class="btn-modal" style="background:var(--text-primary); color:white;" id="btn-edit-save">변경사항 저장</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 기본 인입 초기 더미 데이터 세팅
    let ledgerData = [
        { id: 1, date: '06.28', time: '12:30', mainType: '변동', category: '🍚 식비', title: '점심식사 삼계탕', amount: 12000, isIncome: false, isMisu: false, misuAmt: 0 },
        { id: 2, date: '06.28', time: '13:00', mainType: '변동', category: '☕ 카페', title: '커피 친구 일괄 결제', amount: 9000, isIncome: false, isMisu: true, misuAmt: 4500 },
        { id: 3, date: '06.25', time: '09:00', mainType: '고정', category: '📺 고정구독', title: '넷플릭스', amount: 17000, isIncome: false, isMisu: false, misuAmt: 0 }
    ];

    let showMisuOnly = false;

    // ⚓ 탭 클릭 스위칭 연동 로직
    const navItems = document.querySelectorAll('.nav-item');
    const tabContents = document.querySelectorAll('.tab-content');

    navItems.forEach(item => {
        item.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            navItems.forEach(nav => nav.classList.remove('active'));
            tabContents.forEach(tab => tab.classList.remove('active'));
            
            this.classList.add('active');
            document.getElementById(targetId).classList.add('active');
        });
    });

    document.getElementById('go-to-history').addEventListener('click', () => {
        document.querySelector('[data-target="tab-history"]').click();
    });

    // 💰 한글 금액 정밀 변환기 (750만원, 1만2천원 정규식 처리)
    function parseKoreanAmount(text) {
        let clean = text.replace(/,/g, '').trim();
        let total = 0;

        // '억' 단위 추출 및 계산
        if (clean.includes('억')) {
            let parts = clean.split('억');
            let eokVal = parseInt(parts[0].replace(/[^0-9]/g, '')) || 0;
            total += eokVal * 100000000;
            clean = parts[1] || '';
        }

        // '만' 단위 추출 및 계산
        if (clean.includes('만')) {
            let parts = clean.split('만');
            let manVal = parseInt(parts[0].replace(/[^0-9]/g, '')) || 0;
            total += manVal * 10000;
            clean = parts[1] || '';
        }

        // '천' 단위 추출 및 계산
        if (clean.includes('천')) {
            let parts = clean.split('천');
            let cheonVal = parseInt(parts[0].replace(/[^0-9]/g, '')) || 0;
            total += cheonVal * 1000;
            clean = parts[1] || '';
        }

        // 남은 숫자 정산
        let remain = parseInt(clean.replace(/[^0-9]/g, '')) || 0;
        total += remain;

        // 숫자가 아예 없다면 순수 정수만 리턴 시도
        if (total === 0) {
            let pureNum = parseInt(text.replace(/[^0-9]/g, ''));
            return isNaN(pureNum) ? 0 : pureNum;
        }

        return total;
    }

    // 🧮 핵심 금액 재연산 및 유기적 연동 함수
    function updateCalculations() {
        let totalIncome = 0;
        let totalVariable = 0;
        let totalFixed = 0;
        let totalInvest = 0;

        ledgerData.forEach(item => {
            if (item.isIncome) {
                totalIncome += item.amount;
            } else {
                if (item.mainType === '변동') totalVariable += item.amount;
                if (item.mainType === '고정') totalFixed += item.amount;
                if (item.mainType === '저축' || item.mainType === '투자') totalInvest += item.amount;
            }
        });

        // 대시보드 반영
        let netSuji = totalIncome - (totalVariable + totalFixed + totalInvest);
        document.getElementById('v-suji').textContent = (netSuji >= 0 ? '+' : '') + netSuji.toLocaleString() + '원';
        document.getElementById('v-inc').textContent = totalIncome.toLocaleString() + '원';
        document.getElementById('v-exp').textContent = totalVariable.toLocaleString() + '원';
        document.getElementById('v-fix').textContent = totalFixed.toLocaleString() + '원';
        document.getElementById('v-inv').textContent = totalInvest.toLocaleString() + '원';

        let msgElement = document.getElementById('v-msg');
        if(netSuji > 0) {
            msgElement.textContent = "💰 이번 달 수입이 지출보다 많아 자산이 확장 중입니다.";
        } else if(netSuji < 0) {
            msgElement.textContent = "⚠️ 지출 및 고정비가 수입을 초과했습니다. 예산을 점검하세요.";
        } else {
            msgElement.textContent = "📊 대시보드 지수 수지가 균형을 이루고 있습니다.";
        }

        renderLists();
        renderAnalysisReport(totalIncome, totalVariable, totalFixed, totalInvest);
    }

    // 📋 실시간 리스트 동적 빌드
    function renderLists() {
        const homeBox = document.getElementById('home-recent-box');
        const fullBox = document.getElementById('full-history-box');
        const searchVal = document.getElementById('search-input').value.toLowerCase();

        homeBox.innerHTML = '';
        fullBox.innerHTML = '';

        ledgerData.forEach(item => {
            let isMatched = item.title.toLowerCase().includes(searchVal) || item.category.toLowerCase().includes(searchVal);
            let sign = item.isIncome ? '+' : '-';
            let color = item.isIncome ? 'color:var(--accent-income);' : 'color:var(--text-primary);';
            
            let badgeHtml = '';
            if (item.isMisu) {
                badgeHtml = `<button class="tag-status" data-id="${item.id}">정산받기 (${item.misuAmt.toLocaleString()}원)</button>`;
            } else if (item.misuAmt > 0) {
                badgeHtml = `<span class="tag-status misu-active">정산완료</span>`;
            }

            let itemHtml = `
                <div class="item-left" onclick="openEditModal(${item.id})">
                    <div class="item-icon"><i class="fa-solid fa-receipt"></i></div>
                    <div class="item-info-text">
                        <span class="item-name">${item.title}</span>
                        <span class="item-sub">${item.category} • ${item.date} ${item.time}</span>
                    </div>
                </div>
                <div class="item-right">
                    <span class="item-amt" style="${color}">${sign}${item.amount.toLocaleString()}원</span>
                    ${badgeHtml}
                    <button class="btn-delete" data-id="${item.id}"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            `;

            // 홈 화면 리스트업
            if (homeBox.children.length < 4) {
                let d = document.createElement('div');
                d.className = 'history-item';
                d.innerHTML = itemHtml;
                homeBox.appendChild(d);
            }

            // 내역 명세서 탭 리스트업 (미수 필터 처리 반영)
            if (showMisuOnly && !item.isMisu) return;
            if (!isMatched) return;

            let fd = document.createElement('div');
            fd.className = 'history-item';
            fd.innerHTML = itemHtml;
            fullBox.appendChild(fd);
        });
    }

    // 📊 분석 데이터 및 고도화 보고서 기능 연동
    function renderAnalysisReport(inc, vec, fix, inv) {
        const typeBox = document.getElementById('analysis-type-box');
        const catBox = document.getElementById('analysis-chart-box');
        const compBox = document.getElementById('analysis-compare-box');
        const aiComment = document.getElementById('ai-comment-text');

        // 1. 유형별 차트 빌드
        let totalAll = vec + fix + inv;
        let vecPct = totalAll ? Math.round((vec/totalAll)*100) : 0;
        let fixPct = totalAll ? Math.round((fix/totalAll)*100) : 0;
        let invPct = totalAll ? Math.round((inv/totalAll)*100) : 0;

        typeBox.innerHTML = `
            <div class="chart-row-item">
                <div class="chart-label-group"><span>💸 변동 지출</span><span>${vec.toLocaleString()}원 (${vecPct}%)</span></div>
                <div class="chart-track"><div class="chart-fill" style="width:${vecPct}%; background:#C62828;"></div></div>
            </div>
            <div class="chart-row-item">
                <div class="chart-label-group"><span>🔒 고정비 지출</span><span>${fix.toLocaleString()}원 (${fixPct}%)</span></div>
                <div class="chart-track"><div class="chart-fill" style="width:${fixPct}%; background:#455A64;"></div></div>
            </div>
            <div class="chart-row-item">
                <div class="chart-label-group"><span>📈 저축 및 투자</span><span>${inv.toLocaleString()}원 (${invPct}%)</span></div>
                <div class="chart-track"><div class="chart-fill" style="width:${invPct}%; background:#1565C0;"></div></div>
            </div>
        `;

        // 2. 카테고리별 분할 빌드
        let catMap = {};
        ledgerData.forEach(item => {
            if(!item.isIncome) {
                catMap[item.category] = (catMap[item.category] || 0) + item.amount;
            }
        });

        catBox.innerHTML = '';
        if(Object.keys(catMap).length === 0) {
            catBox.innerHTML = '<div style="font-size:12px; color:var(--text-muted);">지출 내역이 없습니다.</div>';
        } else {
            for(let cat in catMap) {
                let amt = catMap[cat];
                let pct = totalAll ? Math.round((amt/totalAll)*100) : 0;
                catBox.innerHTML += `
                    <div class="chart-row-item">
                        <div class="chart-label-group"><span>${cat}</span><span>${amt.toLocaleString()}원 (${pct}%)</span></div>
                        <div class="chart-track"><div class="chart-fill" style="width:${pct}%;"></div></div>
                    </div>
                `;
            }
        }

        // 3. 전월 비교 더미 시뮬레이션 데이터 매칭
        let prevVec = 45000;
        let prevFix = 17000;
        let vecDiff = vec - prevVec;
        let fixDiff = fix - prevFix;

        compBox.innerHTML = `
            <div class="compare-row"><span>변동지출 전월비교</span><span style="color:${vecDiff>=0?'#C62828':'#2E7D32'}">${vecDiff >= 0 ? '▲' : '▼'} ${Math.abs(vecDiff).toLocaleString()}원</span></div>
            <div class="compare-row"><span>고정비용 전월비교</span><span style="color:${fixDiff>=0?'#C62828':'#2E7D32'}">${fixDiff >= 0 ? '▲' : '▼'} ${Math.abs(fixDiff).toLocaleString()}원</span></div>
        `;

        // 4. 지능형 종합 결산 코멘트 출력
        if(inc === 0 && totalAll === 0) {
            aiComment.textContent = "💡 데이터 인풋이 부족합니다. 입력 창에서 일상 대화나 영수증 내역을 입력해 주세요.";
        } else {
            aiComment.textContent = `📝 현재까지 확인된 총 수입은 ${inc.toLocaleString()}원이며, 고정비와 변동비 지출의 비율은 각각 ${fixPct}%, ${vecPct}%를 유지하고 있습니다. 미수 정산 타겟 데이터 금액을 확보 시 순 자산 수지는 유동적으로 추가 개선될 가능성이 높습니다. 자산 균형을 위해 저축 비율을 좀 더 높이는 포트폴리오를 추천합니다.`;
        }
    }

    // ✏️ 다중 자연어 파싱 엔진 핵심부
    document.getElementById('btn-ai-submit').addEventListener('click', function() {
        let text = document.getElementById('ai-textarea').value.trim();
        if(!text) return;

        // 마침표 또는 문맥 마커 단위로 여러 문장을 개별 배열화 처리
        let sentences = text.split(/[.\n]|\b그리고\b/).map(s => s.trim()).filter(s => s.length > 1);
        let addedCount = 0;

        sentences.forEach(rawSentence => {
            // 단어나 문장 안에 금액 매칭 검사
            let numMatch = rawSentence.match(/[0-9만천원\s,]+/g);
            if(!numMatch) return;

            // 해당 문장에서 가장 유력한 금액 문자열 필터링
            let amtStr = numMatch.sort((a,b) => b.length - a.length)[0];
            let parsedAmount = parseKoreanAmount(amtStr);
            if(parsedAmount === 0) return;

            // 1차 변수 할당 초기화
            let mainType = '변동';
            let category = '🍚 식비';
            let isIncome = false;
            let isMisu = false;
            let misuAmt = 0;

            // 단어 사전 기반 문맥 분류 맵핑 정밀화
            if(rawSentence.includes('월급') || rawSentence.includes('수입') || rawSentence.includes('입금')) {
                mainType = '수입';
                category = '💰 월급';
                isIncome = true;
            } else if(rawSentence.includes('커피') || rawSentence.includes('카페') || rawSentence.includes('스타벅스')) {
                category = '☕ 카페';
            } else if(rawSentence.includes('구독') || rawSentence.includes('넷플릭스') || rawSentence.includes('고정비')) {
                mainType = '고정';
                category = '📺 고정구독';
            } else if(rawSentence.includes('저축') || rawSentence.includes('적금') || rawSentence.includes('투자')) {
                mainType = '저축';
                category = '📈 저축·투자';
            } else if(rawSentence.includes('삼계탕') || rawSentence.includes('식사') || rawSentence.includes('밥')) {
                category = '🍚 식비';
            } else {
                category = '기타';
            }

            // 미수 정산 대상 문맥 감지 서브 모듈
            if(rawSentence.includes('정산받을') || rawSentence.includes('미수') || rawSentence.includes('받아야')) {
                isMisu = true;
                misuAmt = parsedAmount / 2; // 예시 시나리오 기반 절반 또는 지정 처리 유연화 기틀 설정
                if(rawSentence.includes('4500원')) misuAmt = 4500; 
            }

            // 불필요 찌꺼기 문자 제거 후 깔끔한 타이틀 명칭 정제
            let title = rawSentence.replace(/[0-9만천원\s,]+/g, '')
                                   .replace('변동','').replace('고정','').replace('수입','')
                                   .replace('결제함','').replace('먹고','').trim();
            if(!title) title = category + " 건";

            ledgerData.unshift({
                id: Date.now() + Math.floor(Math.random()*1000),
                date: '06.28',
                time: '14:40',
                mainType: mainType,
                category: category,
                title: title,
                amount: parsedAmount,
                isIncome: isIncome,
                isMisu: isMisu,
                misuAmt: misuAmt
            });
            addedCount++;
        });

        if(addedCount > 0) {
            document.getElementById('ai-textarea').value = '';
            updateCalculations();
            // 시각 연동 피드백: 완료 후 자동으로 홈 화면 대시보드 리턴 전환
            document.querySelector('[data-target="tab-home"]').click();
        }
    });

    // 🔍 미수정산 전용 필터 버튼 텍스트 복구 토글 연동
    const misuBtn = document.getElementById('btn-toggle-misu');
    misuBtn.addEventListener('click', function() {
        showMisuOnly = !showMisuOnly;
        if(showMisuOnly) {
            this.textContent = "전체 내역 보기";
            this.style.background = "var(--text-primary)";
            this.style.color = "#FFFFFF";
        } else {
            this.textContent = "미수 정산만";
            this.style.background = "#FAF3EC";
            this.style.color = "#FF9800";
        }
        renderLists();
    });

    // 📋 정산 완료 처리 버튼 및 삭제 동작 클릭 이벤트 위임
    document.body.addEventListener('click', function(e) {
        if(e.target.classList.contains('tag-status') && e.target.tagName === 'BUTTON') {
            e.stopPropagation();
            let id = parseInt(e.target.getAttribute('data-id'));
            let matched = ledgerData.find(x => x.id === id);
            if(matched) {
                matched.isMisu = false;
                matched.title += " (정산완료)";
                updateCalculations();
            }
        }
        if(e.target.closest('.btn-delete')) {
            e.stopPropagation();
            let id = parseInt(e.target.closest('.btn-delete').getAttribute('data-id'));
            ledgerData = ledgerData.filter(x => x.id !== id);
            updateCalculations();
        }
    });

    // 🛠️ 세부 내용 수정 모달 제어 함수
    const editModal = document.getElementById('edit-modal');
    
    window.openEditModal = function(id) {
        let matched = ledgerData.find(x => x.id === id);
        if(!matched) return;

        document.getElementById('edit-id').value = matched.id;
        document.getElementById('edit-datetime').value = `${matched.date} ${matched.time}`;
        document.getElementById('edit-category').value = matched.category;
        document.getElementById('edit-title').value = matched.title;
        document.getElementById('edit-amount').value = matched.amount;

        editModal.classList.add('active');
    };

    document.getElementById('btn-edit-close').addEventListener('click', () => editModal.classList.remove('active'));
    
    document.getElementById('edit-save').onclick = null; // 중복 바인딩 방지용 초기화
    document.getElementById('btn-edit-save').addEventListener('click', function() {
        let id = parseInt(document.getElementById('edit-id').value);
        let matched = ledgerData.find(x => x.id === id);
        if(matched) {
            let dt = document.getElementById('edit-datetime').value.split(' ');
            matched.date = dt[0] || '06.28';
            matched.time = dt[1] || '00:00';
            matched.category = document.getElementById('edit-category').value;
            matched.title = document.getElementById('edit-title').value;
            matched.amount = parseInt(document.getElementById('edit-amount').value) || 0;
            
            // 수입 카테고리 여부에 따라 부호 플래그 스위칭 싱크 보정
            matched.isIncome = (matched.category === '💰 월급');
            if(matched.isIncome) matched.mainType = '수입';
            
            editModal.classList.remove('active');
            updateCalculations();
        }
    });

    // 실시간 검색 인풋 이벤트 연결
    document.getElementById('search-input').addEventListener('input', renderLists);

    // 🚀 초기 런타임 수지 연산 가동
    updateCalculations();
});
</script>
</body>
</html>
