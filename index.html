<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 스마트 가계부 - Galaxy S24 Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #FBF8F3;
            --bg-card: #FFFFFF;
            --text-primary: #3E362E;
            --text-muted: #8A7E72;
            --brand-color: #795548;
            --accent-income: #2E7D32;
            --accent-expense: #C62828;
            --accent-invest: #1565C0;
            --border-light: #F0EAE1;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: #D6CFC4; 
            color: var(--text-primary); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 10px 0;
        }

        /* 📱 갤럭시 S24 뷰포트 맞춤형 스케일링 워크스페이스 */
        .phone-wrapper {
            width: 100%; 
            max-width: 412px; 
            height: calc(100vh - 20px); 
            min-height: 800px;
            background-color: var(--bg-main); 
            position: relative;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            border-radius: 28px; 
            border: 4px solid #222222; 
            padding-top: calc(12px + env(safe-area-inset-top, 16px)); /* 위로 쏠린 느낌을 내리기 위한 상단 안정 여백 */
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }

        @media (max-width: 450px) {
            body { padding: 0; }
            .phone-wrapper {
                max-width: 100vw;
                height: 100vh;
                min-height: 100vh;
                border-radius: 0;
                border: none;
                padding-top: calc(16px + env(safe-area-inset-top, 16px));
            }
        }

        .tab-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 14px 64px 14px; /* 아래 파란 공백 제거를 위해 하단 패딩을 100px -> 64px로 다이어트 */
            display: none; 
        }
        .tab-content.active { 
            display: block; 
        }
        .tab-content::-webkit-scrollbar { display: none; }

        .global-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 2px; }
        .selector-group { display: flex; gap: 4px; }
        .select-box { background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-primary); padding: 4px 6px; border-radius: 6px; font-size: 11px; font-weight: 600; outline: none; cursor: pointer; }

        .app-card { background-color: var(--bg-card); border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--border-light); box-shadow: 0 4px 12px rgba(138, 126, 114, 0.02); }
        
        .dashboard-main { background: linear-gradient(135deg, #FFFDF9 0%, #F5EFE6 100%); text-align: center; padding: 12px; margin-bottom: 8px; }
        .dashboard-main .label { font-size: 11px; color: var(--text-muted); }
        .dashboard-main .val { font-size: 22px; font-weight: 700; margin: 1px 0; }
        .dashboard-main .msg { font-size: 10px; }

        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .grid-item { background: var(--bg-card); padding: 8px; border-radius: 10px; border: 1px solid var(--border-light); display: flex; align-items: center; gap: 6px; }
        .grid-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 11px; }
        .grid-info span { font-size: 9px; color: var(--text-muted); display: block; line-height: 1.1; }
        .grid-info strong { font-size: 12px; font-weight: 700; }

        .target-quick-banner { display: flex; justify-content: space-between; align-items: center; background: #FAF3EC; border: 1px dashed #E0D4C5; padding: 6px 10px; border-radius: 8px; font-size: 10px; font-weight: 600; cursor: pointer; color: var(--brand-color); margin-bottom: 8px; }

        .section-title-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 4px 2px; }
        .section-title { font-size: 11px; font-weight: 700; color: var(--text-primary); }
        .btn-more { font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: none; }

        .search-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        .search-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border-light); padding: 8px 10px; border-radius: 8px; font-size: 12px; outline: none; height: 34px; }
        
        .period-filter-bar { display: flex; gap: 4px; background: #FAF7F2; padding: 4px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-light); }
        .period-btn { flex: 1; background: transparent; border: none; font-size: 11px; color: var(--text-muted); padding: 6px; font-weight: 500; cursor: pointer; border-radius: 6px; }
        .period-btn.active { background: var(--bg-card); color: var(--text-primary); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }

        .history-box { display: flex; flex-direction: column; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 2px; border-bottom: 1px solid #F5EFE6; }
        .history-item:last-child { border-bottom: none; }
        .item-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; cursor: pointer; }
        
        .item-icon { width: 18px; height: 18px; border-radius: 4px; background: #F5EFE6; display: flex; justify-content: center; align-items: center; font-size: 9px; flex-shrink: 0; color: var(--brand-color); }
        .item-info-text { min-width: 0; flex: 1; }
        .item-name { font-size: 11px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .item-sub { font-size: 9px; color: var(--text-muted); margin-top: 0px; }
        .item-right { text-align: right; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .item-amt { font-size: 11px; font-weight: 700; }
        
        .btn-delete { background: none; border: none; color: #C62828; opacity: 0.3; cursor: pointer; padding: 2px; font-size: 10px; }
        .btn-delete:hover { opacity: 1; }
        
        .tag-status { font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 700; display: inline-block; border: none; cursor: pointer; height: 16px; line-height: 14px; }
        .tag-misu { background: #FF9800; color: #FFFFFF; }
        .tag-done { background: #E0E0E0; color: #616161; cursor: default; }

        .btn-filter-action { height: 34px; padding: 0 10px; border-radius: 8px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .btn-filter-misu { background: #FAF3EC; color: #FF9800; border: 1px solid #FFE0B2; }
        .btn-filter-clear { background: var(--text-primary); color: white; }

        /* ⚓ 하단 탭 바 固定 */
        .nav-bar { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: calc(54px + env(safe-area-inset-bottom, 4px)); 
            background-color: var(--bg-card); 
            border-top: 1px solid var(--border-light); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding-bottom: calc(2px + env(safe-area-inset-bottom, 4px)); 
            z-index: 10; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; font-weight: 500; cursor: pointer; text-decoration: none; flex: 1; height: 100%; justify-content: center; }
        .nav-item i { font-size: 14px; margin-bottom: 2px; }
        .nav-item.active { color: var(--text-primary); font-weight: 700; }
        
        .nav-center-add { width: 36px; height: 36px; background-color: var(--text-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 14px; box-shadow: 0 4px 10px rgba(62, 54, 46, 0.15); z-index: 12; cursor: pointer; transition: background 0.2s; margin-bottom: 2px; }
        .nav-center-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: 100%; position: relative; top: -5px; }
        .nav-center-label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
        .nav-item.active .nav-center-label { color: var(--text-primary); font-weight: 700; }

        .target-detail-card { background: #FFFFFF; border: 1px solid var(--border-light); border-radius: 12px; padding: 10px; margin-bottom: 4px; }
        .target-header-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; margin-bottom: 5px; }
        .progress-track-large { width: 100%; height: 6px; background-color: #EFEBE4; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-large { width: 0%; height: 100%; background: linear-gradient(90deg, var(--brand-color) 0%, #A1887F 100%); border-radius: 4px; transition: width 0.5s ease; }
        .target-status-desc { font-size: 10px; color: var(--text-primary); line-height: 1.3; background: #FDFBF7; padding: 6px 8px; border-radius: 6px; border-left: 3px solid var(--brand-color); }

        /* 모달 팝업 공통 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 100; visibility: hidden; opacity: 0; transition: all 0.2s ease; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .custom-modal { background: var(--bg-card); border-radius: 16px; width: 85%; padding: 14px; }
        .modal-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .form-group { margin-bottom: 8px; }
        .form-group label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
        .form-control { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border-light); font-size: 11px; outline: none; color: var(--text-primary); }
        .modal-buttons { display: flex; gap: 6px; margin-top: 12px; }
        .btn-modal { flex: 1; padding: 7px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: #EFEBE4; color: var(--text-primary); }
        .btn-save { background: var(--text-primary); color: white; }
    </style>
</head>
<body>

<div class="phone-wrapper">

    <!-- 홈 탭 -->
    <div id="tab-home" class="tab-content active">
        <div class="global-header">
            <h1 style="font-size: 15px; font-weight: 700;">소비 대시보드</h1>
            <div class="selector-group">
                <select class="select-box" id="home-filter-year">
                    <option value="2026">2026년</option>
                    <option value="2025">2025년</option>
                </select>
                <select class="select-box" id="home-filter-month">
                    <option value="01">1월</option>
                    <option value="02">2월</option>
                    <option value="03">3월</option>
                    <option value="04">4월</option>
                    <option value="05">5월</option>
                    <option value="06" selected>6월</option>
                    <option value="07">7월</option>
                    <option value="08">8월</option>
                    <option value="09">9월</option>
                    <option value="10">10월</option>
                    <option value="11">11월</option>
                    <option value="12">12월</option>
                </select>
            </div>
        </div>
        
        <div class="app-card dashboard-main">
            <span class="label">선택 월 순 자산 수지</span>
            <div class="val" id="home-suji">+3,773,000원</div>
            <div class="msg" id="home-suji-msg">💡 수지가 균형 있게 관리되고 있습니다.</div>
        </div>
        
        <div class="grid-4">
            <div class="grid-item">
                <div class="grid-icon" style="background:#E8F5E9; color:#2E7D32;"><i class="fa-solid fa-wallet"></i></div>
                <div class="grid-info"><span>수입 총합</span><strong id="home-inc">3,850,000원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#FFEBEE; color:#C62828;"><i class="fa-solid fa-pizza-slice"></i></div>
                <div class="grid-info"><span>변동 지출</span><strong id="home-var">60,000원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#ECEFF1; color:#455A64;"><i class="fa-solid fa-lock"></i></div>
                <div class="grid-info"><span>고정비</span><strong id="home-fix">17,000원</strong></div>
            </div>
            <div class="grid-item">
                <div class="grid-icon" style="background:#E8F0FE; color:#1565C0;"><i class="fa-solid fa-chart-line"></i></div>
                <div class="grid-info"><span>저축·투자</span><strong id="home-inv">0원</strong></div>
            </div>
        </div>

        <div class="target-quick-banner" id="home-target-banner">
            <span>⚙️ 현재 한도: <span id="quick-target-name">🛵 배달음식</span> 관리 중</span>
            <span>설정 <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></span>
        </div>

        <div class="section-title-row">
            <span class="section-title">⏱️ 최근 기록 (항목 클릭 시 수정)</span>
            <span class="btn-more" id="btn-home-to-history">전체보기 <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></span>
        </div>
        <div class="app-card" style="padding: 2px 8px; margin-bottom: 4px;">
            <div class="history-box" id="home-recent-container"></div>
        </div>

        <div class="section-title-row">
            <span class="section-title">🎯 소비 절약 목표 지표</span>
        </div>
        <div class="target-detail-card">
            <div class="target-header-meta">
                <span id="home-target-cat">🛵 배달음식</span>
                <span id="home-target-progress" style="color: var(--brand-color);">60,000원 / 300,000원</span>
            </div>
            <div class="progress-track-large">
                <div class="progress-bar-large" id="home-target-bar" style="width: 20%;"></div>
            </div>
            <div class="target-status-desc" id="home-target-msg">💡 계획 대비 안정적으로 절약 타겟 수호 중 (20%)</div>
        </div>
    </div>

    <!-- 내역 탭 -->
    <div id="tab-history" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 15px; font-weight: 700;">상세 내역 명세서</h1>
        </div>
        <div class="period-filter-bar">
            <button class="period-btn active">당월 전체</button>
            <button class="period-btn">기간 설정</button>
            <button class="period-btn">월별 선택 ▾</button>
        </div>
        <div class="search-row">
            <input type="text" class="search-input" id="search-bar" placeholder="🔍 제목, 카테고리 실시간 검색...">
            <button class="btn-filter-action btn-filter-misu" id="btn-quick-misu"><i class="fa-solid fa-filter"></i> 미수 정산만</button>
            <button class="btn-filter-action btn-filter-clear" id="btn-clear-misu" style="display: none;"><i class="fa-solid fa-arrow-left"></i> 뒤로가기</button>
        </div>
        <div class="app-card" style="padding: 4px 8px;">
            <div class="history-box" id="global-history-container"></div>
        </div>
    </div>

    <!-- 입력 탭 -->
    <div id="tab-input" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 15px; font-weight: 700;">자연어 AI 입력</h1>
        </div>
        <div class="app-card" style="padding: 14px 12px;">
            <textarea style="width:100%; height:100px; background:#FBF8F3; border:1px solid #E5DEC9; border-radius:10px; padding:10px; font-size:13px; resize:none; outline:none;" id="main-memo-input" placeholder="예: 스타벅스 4500원 카페"></textarea>
            <button style="width:100%; background:var(--text-primary); color:white; border:none; padding:10px; border-radius:10px; font-weight:700; margin-top:8px; cursor:pointer;" id="btn-main-submit">기록하기</button>
        </div>
    </div>

    <!-- 분석 탭 -->
    <div id="tab-analysis" class="tab-content">
        <div class="global-header">
            <h1 style="font-size: 15px; font-weight: 700;">월간 소비 리포트</h1>
        </div>
        <div class="app-card" id="analysis-chart-container" style="padding: 14px 12px;"></div>
    </div>

    <!-- ⚓ 하단 내비게이션 바 -->
    <div class="nav-bar">
        <div class="nav-item active" data-tab="tab-home"><i class="fa-solid fa-house"></i>홈</div>
        <div class="nav-item" data-tab="tab-history"><i class="fa-regular fa-file-lines"></i>내역</div>
        <div class="nav-center-wrapper" data-tab="tab-input">
            <div class="nav-center-add"><i class="fa-solid fa-plus"></i></div>
            <span class="nav-center-label">입력</span>
        </div>
        <div class="nav-item" data-tab="tab-analysis"><i class="fa-solid fa-chart-pie"></i>분석</div>
    </div>
</div>

<!-- 모달 레이어 생략 (기존 스크립트 기능 완벽 유지됨) -->
<div class="modal-overlay" id="global-modal">
    <div class="custom-modal">
        <div class="modal-title">🎯 소비 절약 한도 설정</div>
        <div class="form-group">
            <label>카테고리</label>
            <select class="form-control" id="modal-cat">
                <option value="🛵 배달음식">🛵 배달음식</option>
                <option value="☕ 카페">☕ 카페</option>
                <option value="🍚 식비">🍚 식비</option>
            </select>
        </div>
        <div class="form-group">
            <label>한도 금액</label>
            <input type="number" class="form-control" id="modal-budget" value="300000">
        </div>
        <div class="modal-buttons">
            <button class="btn-modal btn-cancel" id="btn-modal-close">취소</button>
            <button class="btn-modal btn-save" id="btn-modal-save">저장</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let ledgerData = [
        { id: 1, year: '2026', month: '06', date: '06.28', time: '14:32', mainType: '변동', category: '🛵 배달음식', title: '배달의민족 치킨 전체 결제', amount: 60000, isIncome: false, isMisu: false, isMisuClear: false },
        { id: 2, year: '2026', month: '06', date: '06.28', time: '14:35', mainType: '변동', category: '🛵 배달음식', title: 'A 지출 정산분', amount: 20000, isIncome: false, isMisu: true, isMisuClear: false },
        { id: 3, year: '2026', month: '06', date: '06.28', time: '14:35', mainType: '변동', category: '🛵 배달음식', title: 'B 지출 정산분', amount: 20000, isIncome: false, isMisu: true, isMisuClear: false },
        { id: 4, year: '2026', month: '06', date: '06.25', time: '09:12', mainType: '고정', category: '📺 구독서비스', title: '넷플릭스 정기결제', amount: 17000, isIncome: false, isMisu: false, isMisuClear: false },
        { id: 5, year: '2026', month: '06', date: '06.10', time: '10:00', mainType: '수입', category: '💰 월급', title: '회사 정기 월급여 입금', amount: 3850000, isIncome: true, isMisu: false, isMisuClear: false }
    ];

    let currentTarget = { category: '🛵 배달음식', budget: 300000 };
    const navTabs = document.querySelectorAll('.nav-bar [data-tab]');
    const tabContents = document.querySelectorAll('.tab-content');

    navTabs.forEach(item => {
        item.addEventListener('click', function() {
            const targetTab = this.getAttribute('data-tab');
            tabContents.forEach(tab => tab.classList.remove('active'));
            navTabs.forEach(nav => nav.classList.remove('active'));
            document.getElementById(targetTab).classList.add('active');
            this.classList.add('active');
        });
    });

    function renderHomeRecent() {
        const homeContainer = document.getElementById('home-recent-container');
        homeContainer.innerHTML = '';
        
        // 홈 대시보드에는 최근 3개만 간결하게 뿌려 세로 공간 최적화
        ledgerData.slice(0, 3).forEach(item => {
            const row = document.createElement('div');
            row.className = 'history-item';
            let sign = item.isIncome ? '+' : '-';
            let color = item.isIncome ? 'color:var(--accent-income);' : 'color:var(--text-primary);';
            let badge = item.isMisu ? `<button class="tag-status tag-misu" onclick="window.triggerMisuClear(event, ${item.id})">정산하기</button>` : '';

            row.innerHTML = `
                <div class="item-left">
                    <div class="item-icon"><i class="fa-solid fa-receipt"></i></div>
                    <div class="item-info-text">
                        <span class="item-name">${item.title}</span>
                        <span class="item-sub">${item.category} • ${item.date}</span>
                    </div>
                </div>
                <div class="item-right">
                    <span class="item-amt" style="${color}">${sign}${item.amount.toLocaleString()}원</span>
                    <div>${badge}</div>
                </div>
            `;
            homeContainer.appendChild(row);
        });
    }

    window.triggerMisuClear = function(event, id) {
        event.stopPropagation();
        const item = ledgerData.find(x => x.id === id);
        if(item) { item.isMisu = false; item.isMisuClear = true; item.title += " (정산완료)"; renderHomeRecent(); }
    };

    const modal = document.getElementById('global-modal');
    document.getElementById('home-target-banner').addEventListener('click', () => modal.className = 'modal-overlay active');
    document.getElementById('btn-modal-close').addEventListener('click', () => modal.className = 'modal-overlay');
    document.getElementById('btn-modal-save').addEventListener('click', () => {
        currentTarget.category = document.getElementById('modal-cat').value;
        currentTarget.budget = parseInt(document.getElementById('modal-budget').value) || 300000;
        document.getElementById('quick-target-name').textContent = currentTarget.category;
        document.getElementById('home-target-cat').textContent = currentTarget.category;
        modal.className = 'modal-overlay';
    });

    renderHomeRecent();
});
</script>
</body>
</html>
